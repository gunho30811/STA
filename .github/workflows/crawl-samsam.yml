name: 삼삼엠투 크롤링 자동화 (매일)

on:
  schedule:
    # 매일 21:00 UTC (한국시간 06:00, 아침). 네이버 주간 크롤(월 01:00 UTC=10:00 KST)과
    # 몇 시간 떨어져 있어 같은 파일(net_profit_integrated.csv)을 커밋할 때 겹칠 일이 없다.
    - cron: '0 21 * * *'
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write      # jsonl·csv 를 main에 직접 커밋·push (main은 실제로 미보호 → PR 불필요)

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SAMSAM_EMAIL: ${{ secrets.SAMSAM_EMAIL }}
      SAMSAM_PASSWORD: ${{ secrets.SAMSAM_PASSWORD }}
      # 스케줄 API는 IP당 ~100요청에서 429(멈추면 ~15초 회복). crawler.py가 429 시 공통 쿨다운으로
      # 회복하며 재시도한다. 매물당 ~2.2초라 전체 10,826건(~397분)은 타임아웃(330분) 초과 →
      # 하루 5,000건만 오래된 순으로 갱신(로테이션). 전체는 ~2.2일 주기로 순환.
      SAMSAM_REFRESH_WORKERS: '2'
      SAMSAM_REFRESH_DAILY_LIMIT: '5000'
      SAMSAM_RL_COOLDOWN: '20'
      # 리프레시 도중 1,000건마다 lab/*.jsonl 을 main에 직접 커밋·push → 배포(Vercel) 점진 갱신.
      SAMSAM_DEPLOY_PUSH: '1'
      SAMSAM_DEPLOY_CHUNK: '1000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: git 설정 (봇 커밋 주체)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install flask psycopg2-binary python-dotenv playwright requests

      - name: Playwright Chromium 설치
        run: python -m playwright install chromium --with-deps

      - name: 삼삼 수도권 크롤 (신규 매물 수집 + 기존 매물 예약률 매일 갱신)
        run: python pipeline/samsam/crawler.py

      - name: 예약률 스냅샷 (samsam_snapshots 적재)
        run: python pipeline/samsam/snapshot.py
        continue-on-error: true

      - name: 삼삼 JSONL export (파일 서빙용 lab/*.jsonl 갱신)
        run: python pipeline/samsam/export_jsonl.py
        continue-on-error: true

      - name: 수익성 CSV 재생성 (삼삼 × 네이버 통합)
        run: python pipeline/integrate/build_integrated.py
        continue-on-error: true   # 네이버 데이터 없으면 스킵

      - name: 최종 변경분 커밋 (main 직접 push)
        run: |
          # 크롤 스텝이 리프레시 도중 lab/samsam_listings.jsonl 은 이미 점진 커밋했고,
          # 여기선 스냅샷·CSV까지 포함한 최종 상태를 한 번 더 main에 직접 push한다(PR 없음).
          git add lab/samsam_listings.jsonl lab/samsam_snapshots.jsonl data/net_profit_integrated.csv
          if git diff --cached --quiet; then
            echo "변경분 없음 — 커밋 스킵"
          else
            git commit -m "chore: 삼삼 매물 자동 갱신 $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
